name: CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Build
        run: make deps openapi-validate generate-check build

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: core-backend-build-${{ github.sha }}
          path: |
            api/openapi.bundled.yaml
            internal/api/api.gen.go
          if-no-files-found: error
          retention-days: 14

