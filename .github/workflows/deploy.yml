name: Deploy Core Backend

on:
  push:
    branches: [main, feature/backend2, feature/finalbackend]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/ppraimm/core-backend:latest

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no root@185.23.34.25 << 'EOF'
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_TOKEN }}
            docker pull ghcr.io/ppraimm/core-backend:latest
            docker stop core-backend || true
            docker rm core-backend || true
            docker run -d \
              --name core-backend \
              --restart always \
              -p 8080:8080 \
              --env-file /root/.env \
              ghcr.io/ppraimm/core-backend:latest
            docker image prune -f
          EOF
