name: Deploy Core Backend

on:
  push:
    branches: [main, feature/backend2, feature/finalbackend]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Build Docker image
        run: docker build -t core-backend:latest .

      - name: Save Docker image
        run: docker save core-backend:latest -o core-backend.tar

      - name: Copy to server
        run: scp -o StrictHostKeyChecking=no core-backend.tar root@185.23.34.25:/root/

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no root@185.23.34.25 << 'EOF'
            docker load -i /root/core-backend.tar
            docker stop core-backend || true
            docker rm core-backend || true
            docker run -d \
              --name core-backend \
              --restart always \
              -p 8080:8080 \
              --env-file /root/.env \
              core-backend:latest
            rm -f /root/core-backend.tar
          EOF