openapi: 3.0.0
info:
  title: pprAImm — Платформа AI-сериалов
  version: 1.0.0
  description: |
    Каталог AI-видеосериалов из TikTok.
    Позволяет просматривать категории, сериалы и эпизоды,
    оставлять оценки и комментарии.
    Требует авторизации для оценок и комментариев.
servers:
  - url: http://localhost:8080
    description: Локальный сервер разработки
paths:
  /categories:
    $ref: paths/categories.yaml
  /categories/{slug}:
    $ref: paths/categories_{slug}.yaml
  /series/{id}:
    $ref: paths/series_{id}.yaml
  /series/search:
    $ref: paths/series_search.yaml
  /auth/register:
    $ref: paths/auth_register.yaml
  /auth/login:
    $ref: paths/auth_login.yaml
  /auth/logout:
    $ref: paths/auth_logout.yaml
  /series/{id}/rating:
    $ref: paths/series_{id}_rating.yaml
  /series/{id}/comments:
    $ref: paths/series_{id}_comments.yaml
components:
  parameters:
    CategorySlug:
      $ref: components/parameters/CategorySlug.yaml
    SeriesId:
      $ref: components/parameters/SeriesId.yaml
  schemas:
    Category:
      $ref: components/schemas/Category.yaml
    Series:
      $ref: components/schemas/Series.yaml
    Episode:
      $ref: components/schemas/Episode.yaml
    User:
      $ref: components/schemas/User.yaml
    Comment:
      $ref: components/schemas/Comment.yaml
    Error:
      $ref: components/schemas/Error.yaml
    Rating:
      $ref: components/schemas/Rating.yaml
  responses:
    Unauthorized:
      $ref: components/responses/Unauthorized.yaml
    NotFound:
      $ref: components/responses/NotFound.yaml
  securitySchemes:
    cookieAuth:
      $ref: components/securitySchemes/cookieAuth.yaml
tags:
  - name: Категории
    description: Просмотр категорий сериалов
  - name: Сериалы
    description: Просмотр и поиск сериалов
  - name: Эпизоды
    description: Просмотр эпизодов сериала
  - name: Авторизация
    description: Регистрация, вход и выход
  - name: Рейтинг
    description: Оценки сериалов от пользователей
  - name: Комментарии
    description: Комментарии к сериалам
