type: object
properties:
  id:
    type: integer
    example: 1
  username:
    description: Имя пользователя который оставил комментарий
    type: string
    example: arina
  body:
    type: string
    example: Отличный сериал!
  created_at:
    type: string
    format: date-time
    example: 2024-01-15T10:30:00Z
required:
  - id
  - username
  - body
  - created_at
