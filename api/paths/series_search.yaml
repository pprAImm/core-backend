get:
  operationId: searchSeries
  summary: Поиск сериалов по названию
  description: Ищет сериалы по подстроке в названии (ILIKE)
  parameters:
    - name: q
      in: query
      description: Поисковый запрос
      required: true
      schema:
        type: string
      example: ninja
  responses:
    "200":
      description: Список найденных сериалов. Если ничего не найдено — пустой массив [].
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Series.yaml
  tags:
    - Сериалы
